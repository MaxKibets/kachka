<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-xl); padding: 1.5rem; display: flex; justify-content: center;">
  <div style="width: 360px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 28px; overflow: hidden; font-family: var(--font-sans);">

    <div style="padding: 14px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 12px;">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-secondary);"><path d="M10 4 L6 8 L10 12"/></svg>
      <span style="font-size: 14px; font-weight: 500;">Finish workout</span>
    </div>

    <div style="padding: 22px 18px 18px;">

      <div style="font-size: 22px; font-weight: 500; margin-bottom: 4px;">Push day</div>
      <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 22px;">Saturday · 26 Apr · 47 min</div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px;">
        <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px;">
          <div style="font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; letter-spacing: 0.3px;">VOLUME</div>
          <div style="font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums;">1,240<span style="font-size: 12px; color: var(--color-text-secondary); margin-left: 4px;">kg</span></div>
        </div>
        <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px;">
          <div style="font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; letter-spacing: 0.3px;">SETS</div>
          <div style="font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums;">18</div>
        </div>
        <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px;">
          <div style="font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; letter-spacing: 0.3px;">DURATION</div>
          <div style="font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums;">47<span style="font-size: 12px; color: var(--color-text-secondary); margin-left: 4px;">min</span></div>
        </div>
        <div style="background: var(--color-background-info); border-radius: var(--border-radius-md); padding: 12px 14px;">
          <div style="font-size: 11px; color: var(--color-text-info); margin-bottom: 4px; letter-spacing: 0.3px;">PERSONAL RECORDS</div>
          <div style="font-size: 22px; font-weight: 500; color: var(--color-text-info); font-variant-numeric: tabular-nums;">1<span style="font-size: 14px; margin-left: 4px;">◆</span></div>
        </div>
      </div>

      <div style="margin-bottom: 24px;">
        <div style="font-size: 13px; font-weight: 500; margin-bottom: 8px;">Note</div>
        <textarea style="width: 100%; min-height: 56px; resize: none;" placeholder="How did it feel?"></textarea>
      </div>

      <div style="margin-bottom: 24px;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
          <div style="font-size: 13px; font-weight: 500;">Exercises (5)</div>
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-tertiary);"><path d="M5 6 L8 9 L11 6"/></svg>
        </div>
        <div style="font-size: 13px; color: var(--color-text-secondary); padding: 7px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--color-border-tertiary);">
          <span>Bench press <span style="color: var(--color-text-info); margin-left: 4px;">◆</span></span>
          <span>3 sets · 180 kg</span>
        </div>
        <div style="font-size: 13px; color: var(--color-text-secondary); padding: 7px 0; display: flex; justify-content: space-between; border-bottom: 0.5px solid var(--color-border-tertiary);">
          <span>Pull-ups</span><span>9 reps</span>
        </div>
        <div style="font-size: 13px; color: var(--color-text-secondary); padding: 7px 0; display: flex; justify-content: space-between; border-bottom: 0.5px solid var(--color-border-tertiary);">
          <span>Incline push-ups</span><span>36 reps</span>
        </div>
        <div style="font-size: 12px; color: var(--color-text-tertiary); padding: 7px 0;">+ 2 more</div>
      </div>

      <button style="width: 100%; background: var(--color-text-primary); color: var(--color-background-primary); border: none; padding: 14px; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; margin-bottom: 6px;">
        Save to history
      </button>

      <button style="width: 100%; padding: 12px; font-size: 13px; color: var(--color-text-secondary); background: transparent; border: none;">
        Discard workout
      </button>

    </div>

  </div>
</div>
