<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-xl); padding: 1.5rem; display: flex; justify-content: center;">
  <div style="width: 360px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 28px; overflow: hidden; font-family: var(--font-sans);">

    <div style="padding: 16px; border-bottom: 0.5px solid var(--color-border-tertiary);">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-secondary);"><path d="M4 4 L12 12 M12 4 L4 12"/></svg>
        <span style="font-size: 14px; font-weight: 500;">Push day</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="color: var(--color-text-secondary);"><circle cx="3" cy="8" r="1.2"/><circle cx="8" cy="8" r="1.2"/><circle cx="13" cy="8" r="1.2"/></svg>
      </div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="flex: 1; height: 4px; background: var(--color-background-tertiary); border-radius: 2px; overflow: hidden;">
          <div style="width: 40%; height: 100%; background: var(--color-text-primary);"></div>
        </div>
        <span style="font-size: 12px; color: var(--color-text-secondary);">2 of 5</span>
      </div>
      <div style="font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px;">Workout time 00:18:42</div>
    </div>

    <div style="padding: 16px; border-bottom: 0.5px solid var(--color-border-tertiary);">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
        <span style="font-size: 15px; font-weight: 500;">Bench press</span>
        <div style="display: flex; gap: 12px; color: var(--color-text-secondary);">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="2" width="10" height="12" rx="1"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="11" y2="9"/></svg>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><circle cx="3" cy="8" r="1"/><circle cx="8" cy="8" r="1"/><circle cx="13" cy="8" r="1"/></svg>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 8px; font-size: 11px; color: var(--color-text-tertiary); padding: 0 4px 8px; border-bottom: 0.5px solid var(--color-border-tertiary);">
        <span>set</span><span>prev</span><span>kg</span><span>reps</span><span></span>
      </div>

      <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 8px; align-items: center; font-size: 13px; padding: 8px 4px; color: var(--color-text-secondary);">
        <span>1</span><span>60×5</span><span>60</span><span>5</span>
        <span style="text-align: right; color: var(--color-text-success);"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8 L6.5 11.5 L13 5"/></svg></span>
      </div>

      <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 8px; align-items: center; font-size: 13px; padding: 10px 4px; background: var(--color-background-info); border-radius: var(--border-radius-md); margin: 4px -4px;">
        <span style="color: var(--color-text-info); font-weight: 500;">2</span>
        <span style="color: var(--color-text-info);">60×5</span>
        <span style="color: var(--color-text-info); font-weight: 500;">60</span>
        <span style="color: var(--color-text-info);">_</span>
        <span style="text-align: right;"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-info);"><circle cx="8" cy="8" r="6"/></svg></span>
      </div>

      <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 8px; align-items: center; font-size: 13px; padding: 8px 4px; color: var(--color-text-tertiary);">
        <span>3</span><span>60×5</span><span>—</span><span>—</span>
        <span style="text-align: right;"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/></svg></span>
      </div>

      <div style="font-size: 12px; color: var(--color-text-secondary); padding: 10px 4px 0;">+ add set</div>
    </div>

    <div style="padding: 16px; border-bottom: 0.5px solid var(--color-border-tertiary); position: relative;">
      <div style="position: absolute; left: 8px; top: 36px; bottom: 16px; width: 2px; background: var(--color-text-info); border-radius: 1px;"></div>

      <div style="font-size: 11px; color: var(--color-text-info); margin-bottom: 10px; padding-left: 16px; letter-spacing: 0.4px;">Superset · 3 rounds</div>

      <div style="padding-left: 16px; margin-bottom: 16px;">
        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px;">
          <span style="font-size: 11px; color: var(--color-text-info); font-weight: 500;">A1</span>
          <span style="font-size: 14px; font-weight: 500;">Pull-ups</span>
        </div>
        <div style="display: grid; grid-template-columns: 24px 1fr 1fr 28px; gap: 8px; font-size: 11px; color: var(--color-text-tertiary); padding: 0 4px 6px; border-bottom: 0.5px solid var(--color-border-tertiary);">
          <span>set</span><span>prev</span><span>reps</span><span></span>
        </div>
        <div style="display: grid; grid-template-columns: 24px 1fr 1fr 28px; gap: 8px; align-items: center; font-size: 13px; padding: 8px 4px; color: var(--color-text-tertiary);">
          <span>1</span><span>8</span><span>—</span>
          <span style="text-align: right;"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/></svg></span>
        </div>
      </div>

      <div style="padding-left: 16px;">
        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px;">
          <span style="font-size: 11px; color: var(--color-text-info); font-weight: 500;">A2</span>
          <span style="font-size: 14px; font-weight: 500;">Incline push-ups</span>
        </div>
        <div style="display: grid; grid-template-columns: 24px 1fr 1fr 28px; gap: 8px; font-size: 11px; color: var(--color-text-tertiary); padding: 0 4px 6px; border-bottom: 0.5px solid var(--color-border-tertiary);">
          <span>set</span><span>prev</span><span>reps</span><span></span>
        </div>
        <div style="display: grid; grid-template-columns: 24px 1fr 1fr 28px; gap: 8px; align-items: center; font-size: 13px; padding: 8px 4px; color: var(--color-text-tertiary);">
          <span>1</span><span>12</span><span>—</span>
          <span style="text-align: right;"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/></svg></span>
        </div>
      </div>
    </div>

    <div style="padding: 12px 16px; background: var(--color-background-secondary); display: flex; align-items: center; gap: 10px;">
      <div style="display: flex; align-items: center; gap: 8px; flex: 1;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-secondary);"><circle cx="8" cy="9" r="5"/><line x1="8" y1="9" x2="8" y2="6"/><line x1="6" y1="2" x2="10" y2="2"/></svg>
        <span style="font-size: 16px; font-weight: 500; font-variant-numeric: tabular-nums;">1:23</span>
        <span style="font-size: 11px; color: var(--color-text-tertiary);">rest</span>
      </div>
      <button style="font-size: 12px; padding: 6px 10px;">+15s</button>
      <button style="font-size: 12px; padding: 6px 10px;">skip</button>
    </div>

  </div>
</div>
