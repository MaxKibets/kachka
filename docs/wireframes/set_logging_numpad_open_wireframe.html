<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-xl); padding: 1.5rem; display: flex; justify-content: center;">
  <div style="width: 360px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 28px; overflow: hidden; font-family: var(--font-sans);">

    <div style="padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: space-between;">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-secondary);"><path d="M4 4 L12 12 M12 4 L4 12"/></svg>
      <span style="font-size: 13px; font-weight: 500; color: var(--color-text-secondary);">Push day · 3 of 5</span>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="color: var(--color-text-secondary);"><circle cx="3" cy="8" r="1.2"/><circle cx="8" cy="8" r="1.2"/><circle cx="13" cy="8" r="1.2"/></svg>
    </div>

    <div style="padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary);">
      <div style="font-size: 14px; font-weight: 500; margin-bottom: 8px;">Bench press</div>
      <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 8px; font-size: 11px; color: var(--color-text-tertiary); padding: 0 4px 6px;">
        <span>set</span><span>prev</span><span>kg</span><span>reps</span><span></span>
      </div>
      <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 8px; align-items: center; font-size: 13px; padding: 6px 4px; color: var(--color-text-secondary);">
        <span>1</span><span>60×5</span><span>60</span><span>5</span>
        <span style="text-align: right; color: var(--color-text-success);"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8 L6.5 11.5 L13 5"/></svg></span>
      </div>
      <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 8px; align-items: center; font-size: 13px; padding: 8px 4px; background: var(--color-background-info); border-radius: var(--border-radius-md); margin: 0 -4px;">
        <span style="color: var(--color-text-info); font-weight: 500;">2</span>
        <span style="color: var(--color-text-info);">60×5</span>
        <span style="color: var(--color-text-info); font-weight: 500; padding: 2px 6px; background: var(--color-background-primary); border: 1px solid var(--color-text-info); border-radius: 4px; text-align: center;">60</span>
        <span style="color: var(--color-text-info);">5</span>
        <span style="text-align: right;"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-info);"><circle cx="8" cy="8" r="6"/></svg></span>
      </div>
    </div>

    <div style="background: var(--color-background-secondary); padding: 12px 16px 16px;">

      <div style="display: flex; justify-content: center; margin-bottom: 12px;">
        <div style="width: 32px; height: 3px; background: var(--color-border-secondary); border-radius: 2px;"></div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;">
        <div style="background: var(--color-background-primary); border: 1px solid var(--color-text-info); border-radius: var(--border-radius-md); padding: 10px; text-align: center;">
          <div style="font-size: 11px; color: var(--color-text-info); margin-bottom: 2px;">weight</div>
          <div style="font-size: 18px; font-weight: 500; color: var(--color-text-info); font-variant-numeric: tabular-nums;">60.0 kg</div>
        </div>
        <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px; text-align: center;">
          <div style="font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px;">reps</div>
          <div style="font-size: 18px; font-weight: 500; color: var(--color-text-secondary); font-variant-numeric: tabular-nums;">5</div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px;">
        <button style="font-size: 13px; padding: 10px 0;">−5</button>
        <button style="font-size: 13px; padding: 10px 0;">−2.5</button>
        <button style="font-size: 13px; padding: 10px 0;">+2.5</button>
        <button style="font-size: 13px; padding: 10px 0;">+5</button>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px;">
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">1</button>
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">2</button>
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">3</button>
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">4</button>
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">5</button>
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">6</button>
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">7</button>
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">8</button>
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">9</button>
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">.</button>
        <button style="font-size: 18px; padding: 14px 0; background: var(--color-background-primary);">0</button>
        <button style="padding: 14px 0; background: var(--color-background-primary); display: flex; align-items: center; justify-content: center;">
          <svg width="20" height="16" viewBox="0 0 20 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1 L1 8 L6 15 L19 15 L19 1 Z"/><path d="M10 5 L14 11 M14 5 L10 11"/></svg>
        </button>
      </div>

      <button style="width: 100%; background: var(--color-text-primary); color: var(--color-background-primary); border: none; padding: 14px; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500;">
        Save set
      </button>

    </div>

  </div>
</div>
