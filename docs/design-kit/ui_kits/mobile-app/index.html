<!-- @startingPoint section="Screens" subtitle="Workout session — active screen + rest overlay" viewport="390x780" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kachka — Workout Session</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="./ios-frame.jsx"></script>
<script type="text/babel" src="./WorkoutSession.jsx"></script>
<style>
  *{box-sizing:border-box;}
  body{margin:0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function Toggle({ options, value, onChange }) {
  return (
    <div style={{ display: 'flex', background: '#1A1A1A', borderRadius: 12, padding: 4, gap: 4 }}>
      {options.map((opt) => (
        <button
          key={opt.value}
          onClick={() => onChange(opt.value)}
          style={{
            padding: '8px 16px', borderRadius: 8, border: 'none', cursor: 'pointer',
            fontWeight: 700, fontSize: 13, fontFamily: 'Manrope, sans-serif',
            background: value === opt.value ? '#F26522' : 'transparent',
            color: value === opt.value ? '#fff' : '#9A9A9A'
          }}
        >{opt.label}</button>
      ))}
    </div>
  );
}

function App() {
  const [theme, setTheme] = React.useState('dark');
  const [showPreColumn, setShowPreColumn] = React.useState(true);
  return (
    <div style={{
      minHeight: '100vh', background: theme === 'dark' ? '#050505' : '#e8e5df',
      display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '40px 20px', gap: 20,
      fontFamily: 'Manrope, sans-serif', transition: 'background .2s'
    }}>
      <div style={{ display: 'flex', gap: 16, alignItems: 'center', flexWrap: 'wrap', justifyContent: 'center' }}>
        <Toggle
          value={theme}
          onChange={setTheme}
          options={[{ value: 'dark', label: 'Dark' }, { value: 'light', label: 'Light' }]}
        />
        <Toggle
          value={showPreColumn}
          onChange={setShowPreColumn}
          options={[{ value: true, label: 'Pre: On' }, { value: false, label: 'Pre: Off' }]}
        />
      </div>
      <div style={{ fontFamily: 'monospace', fontSize: 11, color: theme === 'dark' ? '#646464' : '#8a857c', textAlign: 'center', maxWidth: 320 }}>
        Tap a set in "Tricep pushdown" to trigger the rest overlay. Skip or ± 15s from inside it.
      </div>
      <IOSDevice width={390} height={844} dark={theme === 'dark'}>
        <WorkoutSession theme={theme} showPreColumn={showPreColumn} />
      </IOSDevice>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
