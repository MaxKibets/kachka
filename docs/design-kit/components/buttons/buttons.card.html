<!-- @dsCard group="Components" viewport="700x460" subtitle="Icon buttons, secondary/accent buttons, animated CTA" name="Buttons" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--bg);}*{box-sizing:border-box;}</style>
</head>
<body data-theme="dark">
<div id="root"></div>
<script type="text/babel">
const { IconButton, Button, CTAButton } = window.Kachka;

const Chevron = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 5l-7 7 7 7"/></svg>;
const More = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.9"/><circle cx="12" cy="12" r="1.9"/><circle cx="19" cy="12" r="1.9"/></svg>;
const Plus = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>;
const Minus = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M5 12h14"/></svg>;
const Skip = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M5 5l8 7-8 7zM18 5v14"/></svg>;

function Label({children}) {
  return <div style={{fontFamily:'monospace', fontSize:11, color:'var(--text-3)', marginBottom:8}}>{children}</div>;
}

function Demo() {
  return (
    <div style={{padding:24, display:'flex', flexDirection:'column', gap:22, fontFamily:'var(--font-sans)'}}>
      <div>
        <Label>IconButton — size="lg" / size="sm"</Label>
        <div style={{display:'flex', gap:12, alignItems:'center'}}>
          <IconButton size="lg" ariaLabel="Back" icon={<Chevron/>} />
          <IconButton size="sm" ariaLabel="More" icon={<More/>} />
        </div>
      </div>
      <div>
        <Label>Button — variant="secondary"</Label>
        <Button variant="secondary" icon={<Plus/>}>Add set</Button>
      </div>
      <div>
        <Label>Button — row usage (RestBar): secondary tone="text" + accent</Label>
        <div style={{display:'flex', gap:10}}>
          <Button fullWidth={false} flex={1} tone="var(--text)" icon={<Minus/>}>15s</Button>
          <Button fullWidth={false} flex={1.5} variant="accent" gap={8}>Skip rest<Skip/></Button>
          <Button fullWidth={false} flex={1} tone="var(--text)" icon={<Plus/>}>15s</Button>
        </div>
      </div>
      <div>
        <Label>CTAButton — animated hold-to-finish (bottom bar)</Label>
        <div style={{display:'flex', height:62}}>
          <CTAButton />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
