<!-- @dsCard group="Shadows" viewport="700x180" subtitle="Two shadows, each a distinct, singular role" name="Shadows" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;}body{margin:0;}</style></head>
<body data-theme="dark" style="background:var(--bg);font-family:var(--font-sans);padding:24px;color:var(--text);">
  <div style="display:flex;gap:40px;align-items:center;">
    <div>
      <div style="width:160px;height:50px;background:var(--surface);border-top:1px solid var(--line);box-shadow:0 -10px 30px rgba(0,0,0,.22);border-radius:16px 16px 0 0;"></div>
      <div style="margin-top:14px;font-family:monospace;font-size:11px;color:var(--text-3);">--shadow-elevation<br/>bottom bar / RestBar lift</div>
    </div>
    <div>
      <div style="width:120px;height:50px;background:var(--accent);border-radius:16px;box-shadow:0 8px 20px -6px rgba(242,101,34,.6);"></div>
      <div style="margin-top:14px;font-family:monospace;font-size:11px;color:var(--text-3);">--shadow-accent-glow<br/>accent CTAs only</div>
    </div>
  </div>
</body></html>
