<!-- @dsCard group="Radius" viewport="700x190" subtitle="Climbs with element size/prominence" name="Radius scale" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;}body{margin:0;}</style></head>
<body data-theme="dark" style="background:var(--bg);font-family:var(--font-sans);padding:20px;color:var(--text);">
  <div style="display:flex;gap:16px;align-items:flex-end;">
    <div><div style="width:56px;height:56px;background:var(--surface-2);border-radius:2px;"></div><div style="margin-top:6px;font-family:monospace;font-size:10px;color:var(--text-3);">2px</div></div>
    <div><div style="width:56px;height:56px;background:var(--surface-2);border-radius:12px;"></div><div style="margin-top:6px;font-family:monospace;font-size:10px;color:var(--text-3);">12px</div></div>
    <div><div style="width:56px;height:56px;background:var(--surface-2);border-radius:16px;"></div><div style="margin-top:6px;font-family:monospace;font-size:10px;color:var(--text-3);">16px</div></div>
    <div><div style="width:56px;height:56px;background:var(--surface-2);border-radius:24px;"></div><div style="margin-top:6px;font-family:monospace;font-size:10px;color:var(--text-3);">24px</div></div>
    <div><div style="width:56px;height:56px;background:var(--surface-2);border-radius:28px 28px 0 0;"></div><div style="margin-top:6px;font-family:monospace;font-size:10px;color:var(--text-3);">28px (sheet)</div></div>
    <div><div style="width:56px;height:56px;background:var(--surface-2);border-radius:50%;"></div><div style="margin-top:6px;font-family:monospace;font-size:10px;color:var(--text-3);">50% (circles)</div></div>
  </div>
</body></html>
