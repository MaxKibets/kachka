<!-- @dsCard group="Spacing" viewport="700x180" subtitle="2px step — every value actually in use" name="Spacing scale" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;}body{margin:0;}</style></head>
<body data-theme="dark" style="background:var(--bg);font-family:var(--font-sans);padding:20px;color:var(--text);">
  <div style="display:flex;flex-direction:column;gap:8px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:2px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">2</span>
      <div style="width:4px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">4</span>
      <div style="width:6px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">6</span>
      <div style="width:8px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">8</span>
      <div style="width:10px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">10</span>
      <div style="width:12px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">12</span>
      <div style="width:14px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">14</span>
      <div style="width:16px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">16</span>
      <div style="width:18px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">18</span>
      <div style="width:22px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">22</span>
      <div style="width:24px;height:14px;background:var(--accent);"></div><span style="font-family:monospace;font-size:11px;color:var(--text-3);">24</span>
    </div>
    <div style="font-family:monospace;font-size:11px;color:var(--text-3);margin-top:6px;">--space-1 … --space-11. The same element role always gets the same value — no ad hoc one-offs.</div>
  </div>
</body></html>
