<!-- @dsCard group="Type" viewport="700x190" subtitle="Letter-spacing roles" name="Tracking" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;}body{margin:0;}</style></head>
<body data-theme="dark" style="background:var(--bg);font-family:var(--font-sans);padding:20px;color:var(--text);display:flex;flex-direction:column;gap:12px;">
  <div style="display:flex;align-items:baseline;gap:12px;">
    <span style="font-size:18px;font-weight:700;letter-spacing:-.01em;width:150px;">Push A</span>
    <span style="font-family:monospace;font-size:11px;color:var(--text-3);">-.01em — titles, big numbers, CTA label</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:12px;">
    <span style="font-size:38px;font-weight:700;letter-spacing:-.02em;width:150px;line-height:1;">01:24</span>
    <span style="font-family:monospace;font-size:11px;color:var(--text-3);">-.02em — RestBar countdown only</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:12px;">
    <span style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;width:150px;color:var(--text-3);">Sets · Kg · Reps</span>
    <span style="font-family:monospace;font-size:11px;color:var(--text-3);">.07em — 10px uppercase micro-labels</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:12px;">
    <span style="font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;width:150px;color:var(--accent);">Resting</span>
    <span style="font-family:monospace;font-size:11px;color:var(--text-3);">.09em — RestBar "RESTING" label only</span>
  </div>
</body></html>
