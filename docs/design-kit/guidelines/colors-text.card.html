<!-- @dsCard group="Colors" viewport="700x200" subtitle="Text hierarchy — three steps, dark & light" name="Text colors" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;}body{margin:0;}</style></head>
<body style="margin:0;font-family:var(--font-sans);">
  <div style="display:flex;">
    <div data-theme="dark" style="flex:1;background:var(--bg);padding:20px;display:flex;flex-direction:column;gap:10px;">
      <div style="color:var(--text);font-weight:700;font-size:16px;">Bench press <span style="font-family:monospace;font-size:10px;color:var(--text-3);font-weight:400;">--text</span></div>
      <div style="color:var(--text-2);font-weight:700;font-size:14px;">Round 2 of 3 <span style="font-family:monospace;font-size:10px;color:var(--text-3);font-weight:400;">--text-2</span></div>
      <div style="color:var(--text-3);font-weight:700;font-size:14px;">72.5 × 8 <span style="font-family:monospace;font-size:10px;font-weight:400;">--text-3</span></div>
    </div>
    <div data-theme="light" style="flex:1;background:var(--bg);padding:20px;display:flex;flex-direction:column;gap:10px;">
      <div style="color:var(--text);font-weight:700;font-size:16px;">Bench press <span style="font-family:monospace;font-size:10px;color:var(--text-3);font-weight:400;">--text</span></div>
      <div style="color:var(--text-2);font-weight:700;font-size:14px;">Round 2 of 3 <span style="font-family:monospace;font-size:10px;color:var(--text-3);font-weight:400;">--text-2</span></div>
      <div style="color:var(--text-3);font-weight:700;font-size:14px;">72.5 × 8 <span style="font-family:monospace;font-size:10px;font-weight:400;">--text-3</span></div>
    </div>
  </div>
</body></html>
