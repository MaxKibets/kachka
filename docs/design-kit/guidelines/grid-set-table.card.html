<!-- @dsCard group="Layout" viewport="700x260" subtitle="Set-table grid — with and without the optional Pre column" name="Set-table grid" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;}body{margin:0;}
  .cell{background:var(--surface-2);border-radius:6px;padding:6px 0;text-align:center;font-family:monospace;font-size:10px;color:var(--text-2);}
</style></head>
<body data-theme="dark" style="background:var(--bg);font-family:var(--font-sans);padding:20px;color:var(--text);display:flex;flex-direction:column;gap:20px;">
  <div>
    <div style="font-family:monospace;font-size:11px;color:var(--text-3);margin-bottom:8px;">showPreColumn = true</div>
    <div style="display:grid;grid-template-columns:28px minmax(0,1fr) 24px minmax(0,1fr) minmax(0,1fr) 30px;gap:6px;">
      <div class="cell">28</div><div class="cell">1fr</div><div class="cell">24</div><div class="cell">1fr</div><div class="cell">1fr</div><div class="cell">30</div>
    </div>
    <div style="display:flex;font-family:monospace;font-size:10px;color:var(--text-3);margin-top:4px;gap:6px;">
      <span style="flex:none;width:28px;text-align:center;">Set</span><span style="flex:1;text-align:center;">Previous</span><span style="flex:none;width:24px;text-align:center;">Pre</span><span style="flex:1;text-align:center;">Kg</span><span style="flex:1;text-align:center;">Reps</span><span style="flex:none;width:30px;">✓</span>
    </div>
  </div>
  <div>
    <div style="font-family:monospace;font-size:11px;color:var(--text-3);margin-bottom:8px;">showPreColumn = false — column removed, not hidden</div>
    <div style="display:grid;grid-template-columns:28px minmax(0,1fr) minmax(0,1fr) minmax(0,1fr) 30px;gap:6px;">
      <div class="cell">28</div><div class="cell">1fr</div><div class="cell">1fr</div><div class="cell">1fr</div><div class="cell">30</div>
    </div>
  </div>
  <div style="font-family:monospace;font-size:11px;color:var(--text-3);">Flexible columns are always minmax(0,1fr), never bare 1fr — otherwise long content in one row drifts that row's columns out of alignment with the rest.</div>
</body></html>
