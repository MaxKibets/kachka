<!-- @dsCard group="Colors" viewport="700x190" subtitle="Light surfaces — alternate theme via [data-theme=light]" name="Light surfaces" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;}body{margin:0;}</style></head>
<body data-theme="light" style="background:var(--bg);font-family:var(--font-sans);padding:20px;">
  <div style="display:flex;gap:14px;">
    <div style="flex:1;">
      <div style="height:64px;border-radius:12px;background:var(--bg);border:1px solid var(--line);"></div>
      <div style="margin-top:8px;font-family:monospace;font-size:11px;color:var(--text-2);">--bg</div>
      <div style="font-family:monospace;font-size:10px;color:var(--text-3);">#F2F0EC</div>
    </div>
    <div style="flex:1;">
      <div style="height:64px;border-radius:12px;background:var(--surface);border:1px solid var(--line);"></div>
      <div style="margin-top:8px;font-family:monospace;font-size:11px;color:var(--text-2);">--surface</div>
      <div style="font-family:monospace;font-size:10px;color:var(--text-3);">#FFFFFF</div>
    </div>
    <div style="flex:1;">
      <div style="height:64px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);"></div>
      <div style="margin-top:8px;font-family:monospace;font-size:11px;color:var(--text-2);">--surface-2</div>
      <div style="font-family:monospace;font-size:10px;color:var(--text-3);">#F1EEE9</div>
    </div>
    <div style="flex:1;">
      <div style="height:64px;border-radius:12px;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;">
        <div style="width:70%;height:1px;background:var(--line);"></div>
      </div>
      <div style="margin-top:8px;font-family:monospace;font-size:11px;color:var(--text-2);">--line</div>
      <div style="font-family:monospace;font-size:10px;color:var(--text-3);">rgba(0,0,0,.1)</div>
    </div>
  </div>
</body></html>
