<!-- @dsCard group="Sizing" viewport="700x190" subtitle="44px primary vs 30px secondary — icon scale n-2" name="Touch targets" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;}body{margin:0;}</style></head>
<body data-theme="dark" style="background:var(--bg);font-family:var(--font-sans);padding:20px;color:var(--text);">
  <div style="display:flex;gap:32px;align-items:center;">
    <div style="text-align:center;">
      <div style="width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
      </div>
      <div style="margin-top:8px;font-family:monospace;font-size:11px;color:var(--text-3);">44px — nav<br/>18px icon</div>
    </div>
    <div style="text-align:center;">
      <div style="width:30px;height:30px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-2)"><circle cx="5" cy="12" r="1.9"/><circle cx="12" cy="12" r="1.9"/><circle cx="19" cy="12" r="1.9"/></svg>
      </div>
      <div style="margin-top:8px;font-family:monospace;font-size:11px;color:var(--text-3);">30px — kebab<br/>16px icon</div>
    </div>
    <div style="font-family:monospace;font-size:11px;color:var(--text-3);max-width:280px;">30px is intentionally below the 44px touch-target minimum — confirmed acceptable for secondary actions and non-interactive elements (exercise icon chips, set markers).</div>
  </div>
</body></html>
