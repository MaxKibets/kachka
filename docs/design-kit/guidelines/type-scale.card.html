<!-- @dsCard group="Type" viewport="700x280" subtitle="10 / 14 / 16 / 18 / 38 — the only five sizes in the product" name="Type scale" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;}body{margin:0;}</style></head>
<body data-theme="dark" style="background:var(--bg);font-family:var(--font-sans);padding:20px;color:var(--text);display:flex;flex-direction:column;gap:14px;">
  <div style="display:flex;align-items:baseline;gap:12px;">
    <span style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);width:110px;">SETS DONE</span>
    <span style="font-family:monospace;font-size:11px;color:var(--text-3);">10px — micro-labels</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:12px;">
    <span style="font-size:14px;font-weight:700;width:110px;">70.0 kg</span>
    <span style="font-family:monospace;font-size:11px;color:var(--text-3);">14px — primary data</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:12px;">
    <span style="font-size:16px;font-weight:700;letter-spacing:-.01em;width:110px;">Bench press</span>
    <span style="font-family:monospace;font-size:11px;color:var(--text-3);">16px — exercise/superset name</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:12px;">
    <span style="font-size:18px;font-weight:700;letter-spacing:-.01em;width:110px;">Push A</span>
    <span style="font-family:monospace;font-size:11px;color:var(--text-3);">18px — screen title / "—" placeholder</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:12px;">
    <span style="font-size:38px;font-weight:700;letter-spacing:-.02em;width:110px;line-height:1;">01:24</span>
    <span style="font-family:monospace;font-size:11px;color:var(--text-3);">38px — RestBar countdown only</span>
  </div>
  <div style="font-family:monospace;font-size:11px;color:var(--text-3);margin-top:4px;">Weight is 700 everywhere, no exceptions — hierarchy comes from size + color only.</div>
</body></html>
