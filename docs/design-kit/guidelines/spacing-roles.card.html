<!-- @dsCard group="Spacing" viewport="700x320" subtitle="Named roles — same role, same value, always" name="Spacing roles" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;}body{margin:0;}
  .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .row:last-child{border-bottom:none;}
</style></head>
<body data-theme="dark" style="background:var(--bg);font-family:var(--font-sans);padding:20px 24px;color:var(--text);">
  <div class="row"><span>Exercise card padding</span><span style="font-family:monospace;color:var(--text-3);">16px</span></div>
  <div class="row"><span>Card header → content</span><span style="font-family:monospace;color:var(--text-3);">12px</span></div>
  <div class="row"><span>Round progress → first exercise</span><span style="font-family:monospace;color:var(--text-3);">16px</span></div>
  <div class="row"><span>Add set/round button, margin-top</span><span style="font-family:monospace;color:var(--text-3);">10px</span></div>
  <div class="row"><span>Screen header padding</span><span style="font-family:monospace;color:var(--text-3);">14px 10px</span></div>
  <div class="row"><span>Exercise list gap</span><span style="font-family:monospace;color:var(--text-3);">10px</span></div>
  <div class="row"><span>Set-table column gap</span><span style="font-family:monospace;color:var(--text-3);">6px</span></div>
  <div class="row"><span>Round-progress segment gap</span><span style="font-family:monospace;color:var(--text-3);">4px</span></div>
  <div class="row"><span>Bottom bar padding</span><span style="font-family:monospace;color:var(--text-3);">14px 10px</span></div>
  <div class="row"><span>Bottom bar → screen, margin-top</span><span style="font-family:monospace;color:var(--text-3);">18px</span></div>
</body></html>
