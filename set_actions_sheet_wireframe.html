<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-xl); padding: 1.5rem; display: flex; justify-content: center;">
  <div style="width: 360px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 28px; overflow: hidden; font-family: var(--font-sans);">

    <div style="padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: space-between; opacity: 0.4;">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-secondary);"><path d="M4 4 L12 12 M12 4 L4 12"/></svg>
      <span style="font-size: 13px; font-weight: 500; color: var(--color-text-secondary);">Push day · 3 of 5</span>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="color: var(--color-text-secondary);"><circle cx="3" cy="8" r="1.2"/><circle cx="8" cy="8" r="1.2"/><circle cx="13" cy="8" r="1.2"/></svg>
    </div>

    <div style="padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); opacity: 0.4;">
      <div style="font-size: 14px; font-weight: 500; margin-bottom: 8px;">Bench press</div>
      <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 8px; align-items: center; font-size: 13px; padding: 6px 4px; color: var(--color-text-secondary);">
        <span>1</span><span>60×5</span><span>60</span><span>5</span>
        <span style="text-align: right; color: var(--color-text-success);"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8 L6.5 11.5 L13 5"/></svg></span>
      </div>
      <div style="display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 8px; align-items: center; font-size: 13px; padding: 6px 4px; background: var(--color-background-info); border-radius: var(--border-radius-md); margin: 0 -4px;">
        <span style="color: var(--color-text-info); font-weight: 500;">2</span>
        <span style="color: var(--color-text-info);">60×5</span>
        <span style="color: var(--color-text-info);">60</span>
        <span style="color: var(--color-text-info);">_</span>
        <span style="text-align: right;"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-info);"><circle cx="8" cy="8" r="6"/></svg></span>
      </div>
    </div>

    <div style="padding: 14px 18px 18px;">

      <div style="display: flex; justify-content: center; margin-bottom: 12px;">
        <div style="width: 32px; height: 3px; background: var(--color-border-secondary); border-radius: 2px;"></div>
      </div>

      <div style="font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; letter-spacing: 0.4px;">SET 2 · BENCH PRESS</div>
      <div style="font-size: 16px; font-weight: 500; margin-bottom: 14px;">Set actions</div>

      <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid var(--color-border-tertiary);">
        <div>
          <div style="font-size: 14px; margin-bottom: 2px;">Mark as warmup</div>
          <div style="font-size: 11px; color: var(--color-text-tertiary);">Excluded from volume and PR</div>
        </div>
        <div style="width: 38px; height: 22px; background: var(--color-border-secondary); border-radius: 11px; position: relative; flex-shrink: 0;">
          <div style="width: 18px; height: 18px; background: var(--color-background-primary); border-radius: 50%; position: absolute; top: 2px; left: 2px; border: 0.5px solid var(--color-border-tertiary);"></div>
        </div>
      </div>

      <div style="padding: 14px 0; border-bottom: 0.5px solid var(--color-border-tertiary);">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
          <div style="font-size: 14px;">RPE</div>
          <div style="font-size: 11px; color: var(--color-text-tertiary);">how hard the set felt</div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px;">
          <button style="font-size: 12px; padding: 6px 0;">1</button>
          <button style="font-size: 12px; padding: 6px 0;">2</button>
          <button style="font-size: 12px; padding: 6px 0;">3</button>
          <button style="font-size: 12px; padding: 6px 0;">4</button>
          <button style="font-size: 12px; padding: 6px 0;">5</button>
          <button style="font-size: 12px; padding: 6px 0;">6</button>
          <button style="font-size: 12px; padding: 6px 0;">7</button>
          <button style="font-size: 12px; padding: 6px 0; background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-text-info); font-weight: 500;">8</button>
          <button style="font-size: 12px; padding: 6px 0;">9</button>
          <button style="font-size: 12px; padding: 6px 0;">10</button>
        </div>
      </div>

      <div style="padding: 16px 0; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 12px;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-secondary);"><rect x="3" y="2" width="10" height="12" rx="1"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="11" y2="9"/></svg>
        <span style="font-size: 14px; flex: 1;">Add note</span>
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-tertiary);"><path d="M6 4 L10 8 L6 12"/></svg>
      </div>

      <div style="padding: 16px 0; display: flex; align-items: center; gap: 12px;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-danger);"><path d="M3 4 H13"/><path d="M5 4 V13 H11 V4"/><path d="M6 4 V2 H10 V4"/><line x1="7" y1="7" x2="7" y2="11"/><line x1="9" y1="7" x2="9" y2="11"/></svg>
        <span style="font-size: 14px; color: var(--color-text-danger);">Delete set</span>
      </div>

    </div>

  </div>
</div>
